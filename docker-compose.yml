services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.13-slim}
    container_name: scholar-backend
    env_file: .env
    environment:
      - CORS_ORIGINS=["http://localhost:3001","http://127.0.0.1:3001"]
    volumes:
      - ./docker-data:/scholar/backend/data
    ports:
      - "8001:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/models')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    container_name: scholar-frontend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
